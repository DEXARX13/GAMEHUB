<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMEOUT — Aim Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════ */
:root {
  --bg:        #0a0a0f;
  --surface:   #12121a;
  --panel:     #1a1a26;
  --border:    #2a2a3d;
  --accent:    #00e676;
  --accent2:   #ffb300;
  --red:       #ff2244;
  --text:      #e8e8f0;
  --muted:     #6b6b8a;
  --gold:      #ffd600;
  --silver:    #c0c0d0;
  --bronze:    #cd7f32;
  --radius:    8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Space Mono', monospace;
  background: var(--bg);
  color: var(--text);
  user-select: none;
  cursor: none;
}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
#app {
  display: grid;
  grid-template-columns: 240px 1fr 260px;
  grid-template-rows: 56px 1fr;
  height: 100vh;
}

/* ─── HEADER ─────────────────────────── */
#header {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
}
#header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 4px;
  color: var(--accent);
  line-height: 1;
}
#header .subtitle {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ─── SIDEBAR LEFT ───────────────────── */
#sidebar-left {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
  overflow-y: auto;
}

/* ─── ZONE ───────────────────────────── */
#zone {
  position: relative;
  background: var(--bg);
  overflow: hidden;
  cursor: none;
}
#zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 50%, rgba(0,230,118,0.03) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
  pointer-events: none;
}

/* ─── SIDEBAR RIGHT ──────────────────── */
#sidebar-right {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ═══════════════════════════════════════
   TIMER BAR
═══════════════════════════════════════ */
#timer-wrap {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--border);
  z-index: 10;
}
#timer-bar {
  height: 100%;
  width: 100%;
  background: var(--accent);
  transition: background 0.3s;
}

/* ═══════════════════════════════════════
   IDLE + RESULT
═══════════════════════════════════════ */
#idle-msg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--muted);
  pointer-events: none;
  transition: opacity 0.3s;
}
#result {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  text-align: center;
  pointer-events: none;
  color: var(--text);
  text-shadow: 0 0 20px rgba(0,230,118,0.4);
}
#result.win  { color: var(--accent); }
#result.lose { color: var(--red); text-shadow: 0 0 20px rgba(255,34,68,0.6); }

/* ═══════════════════════════════════════
   CIBLE
═══════════════════════════════════════ */
#cible {
  position: absolute;
  width: 50px; height: 50px;
  display: none;
  cursor: none;
  z-index: 5;
}
#cible svg { width: 100%; height: 100%; }
@keyframes pop-in {
  0%   { transform: scale(0.3); opacity: 0; }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
#cible.teleport { animation: pop-in 0.12s cubic-bezier(.2,.8,.4,1) forwards; }

/* ═══════════════════════════════════════
   CROSSHAIR OVERLAY
═══════════════════════════════════════ */
#crosshair-overlay {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  display: none;
  transform: translate(-50%, -50%);
}

/* ═══════════════════════════════════════
   POPUPS HIT / MISS
═══════════════════════════════════════ */
@keyframes popup-float {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-36px) scale(0.8); }
}
.popup {
  position: absolute;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  pointer-events: none;
  animation: popup-float 0.6s ease forwards;
  z-index: 20;
}
.popup.hit  { color: var(--accent); }
.popup.miss { color: var(--red); }

/* ═══════════════════════════════════════
   FLASH MISS
═══════════════════════════════════════ */
@keyframes flash-miss-anim {
  0%,100% { box-shadow: inset 0 0 0 0 rgba(255,34,68,0); }
  50%      { box-shadow: inset 0 0 0 6px rgba(255,34,68,0.6); }
}
#zone.flash-miss { animation: flash-miss-anim 0.25s ease; }

/* ONE HIT MODE */
#zone.one-hit-mode::after {
  content: '☠ ONE HIT';
  position: absolute;
  top: 12px; right: 12px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--red);
  opacity: 0.5;
  pointer-events: none;
}

/* ═══════════════════════════════════════
   SECTION TITLES
═══════════════════════════════════════ */
.section-title {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.stat-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  text-align: center;
}
.stat-box .stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  line-height: 1;
  color: var(--accent);
}
.stat-box.miss-box .stat-val { color: var(--red); }
.stat-box .stat-label {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--muted);
  margin-top: 2px;
}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: none;
  border-radius: var(--radius);
  padding: 10px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--accent);
  color: #000;
  width: 100%;
  padding: 12px;
  font-size: 13px;
}
.btn-primary:hover  { background: #00ff88; transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  width: 100%;
}
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }
.btn-danger {
  background: transparent;
  color: var(--red);
  border: 1px solid var(--red);
  opacity: 0.6;
  font-size: 9px;
  padding: 5px 8px;
}
.btn-danger:hover { opacity: 1; }
.btn-icon {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  width: 32px; height: 32px;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  font-size: 14px;
}
.btn-icon:hover { color: var(--text); border-color: var(--muted); }

/* ═══════════════════════════════════════
   TOGGLE
═══════════════════════════════════════ */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.toggle-label {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.toggle-label small { color: var(--muted); font-size: 8px; }
.toggle-wrap {
  position: relative;
  width: 44px; height: 24px;
  flex-shrink: 0;
}
.toggle-wrap input { opacity: 0; width: 0; height: 0; }
.slider-toggle {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 24px;
  cursor: pointer;
  transition: background 0.25s;
}
.slider-toggle::before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  left: 3px; top: 3px;
  background: var(--muted);
  border-radius: 50%;
  transition: all 0.25s;
}
.toggle-wrap input:checked + .slider-toggle { background: rgba(255,34,68,0.3); }
.toggle-wrap input:checked + .slider-toggle::before { transform: translateX(20px); background: var(--red); }

/* ═══════════════════════════════════════
   PSEUDO INPUT
═══════════════════════════════════════ */
#pseudo-wrap {
  display: none;
  flex-direction: column;
  gap: 6px;
  padding: 10px;
  background: var(--panel);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  box-shadow: 0 0 16px rgba(0,230,118,0.15);
}
#pseudo-wrap label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--accent);
}
#pseudo-input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s;
}
#pseudo-input:focus { border-color: var(--accent); }

/* ═══════════════════════════════════════
   LEADERBOARD
═══════════════════════════════════════ */
.lb-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.lb-tab {
  flex: 1;
  padding: 10px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: transparent;
  color: var(--muted);
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  border-bottom: 2px solid transparent;
}
.lb-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.lb-tab:hover:not(.active) { color: var(--text); }

.lb-panel { display: none; flex: 1; overflow-y: auto; padding: 10px; }
.lb-panel.active { display: block; }

.lb-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.lb-list li {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  align-items: center;
  gap: 6px;
  padding: 7px 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 10px;
  transition: border-color 0.2s;
}
.lb-list li.top1 { border-color: var(--gold);   background: rgba(255,214,0,0.05); }
.lb-list li.top2 { border-color: var(--silver);  background: rgba(192,192,208,0.04); }
.lb-list li.top3 { border-color: var(--bronze);  background: rgba(205,127,50,0.04); }

.lb-rank {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  text-align: center;
  color: var(--muted);
}
.lb-rank.gold   { color: var(--gold); }
.lb-rank.silver { color: var(--silver); }
.lb-rank.bronze { color: var(--bronze); }
.lb-pseudo { font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--accent);
  text-align: right;
}
.lb-miss { font-size: 9px; color: var(--red); opacity: 0.8; }

.lb-empty {
  text-align: center;
  color: var(--muted);
  font-size: 9px;
  letter-spacing: 2px;
  padding: 20px;
  display: none;
}

.lb-footer {
  padding: 8px;
  border-top: 1px solid var(--border);
}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
#modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}
#modal-backdrop.open { display: flex; }
#modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: min(700px, 95vw);
  max-height: 90vh;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--accent);
}
.btn-close {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 32px; height: 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-close:hover { color: var(--text); border-color: var(--muted); }

/* crosshair preview */
.ch-preview-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 120px; height: 120px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* preset grid */
#preset-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.preset-btn {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.preset-btn:hover { color: var(--text); border-color: var(--accent); }

/* shape buttons */
.shape-btns { display: flex; flex-wrap: wrap; gap: 6px; }
.shape-btn {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.shape-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,230,118,0.08); }
.shape-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

/* controls grid */
.controls-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.ctrl-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.ctrl-row label {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
}
.ctrl-row label span {
  color: var(--text);
  font-size: 10px;
}
.ctrl-row input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
.ctrl-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.1s;
}
.ctrl-row input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
.ctrl-row input[type=color] {
  -webkit-appearance: none;
  border: 1px solid var(--border);
  background: var(--panel);
  border-radius: 4px;
  width: 100%;
  height: 32px;
  cursor: pointer;
  padding: 2px;
}
.ctrl-row input[type=number] {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 5px 8px;
  border-radius: 4px;
  outline: none;
  width: 100%;
}
.ctrl-row input[type=number]:focus { border-color: var(--accent); }

.modal-row { display: flex; gap: 16px; align-items: flex-start; }
.modal-col { flex: 1; display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>

<!-- CROSSHAIR OVERLAY -->
<svg id="crosshair-overlay" xmlns="http://www.w3.org/2000/svg"></svg>

<!-- APP LAYOUT -->
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <h1>TIMEOUT</h1>
    <div class="subtitle">aim trainer</div>
    <div class="header-right">
      <button class="btn btn-icon" id="btn-open-params" title="Paramètres crosshair">⚙</button>
    </div>
  </header>

  <!-- LEFT SIDEBAR -->
  <aside id="sidebar-left">
    <div class="section-title">Stats</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val" id="score-val">0</div>
        <div class="stat-label">Score</div>
      </div>
      <div class="stat-box miss-box">
        <div class="stat-val" id="miss-val">0</div>
        <div class="stat-label">Miss</div>
      </div>
    </div>

    <div class="section-title" style="margin-top:4px">Contrôles</div>
    <button class="btn btn-primary" id="btn-start">▶ START</button>

    <div id="pseudo-wrap">
      <label>Enregistrer le score</label>
      <input type="text" id="pseudo-input" placeholder="Ton pseudo…" maxlength="16">
      <button class="btn btn-primary" id="btn-save">Sauvegarder</button>
    </div>

    <div class="section-title" style="margin-top:4px">Mode</div>
    <div class="toggle-row">
      <div class="toggle-label">
        ONE HIT
        <small>Un miss = perdu</small>
      </div>
      <label class="toggle-wrap">
        <input type="checkbox" id="toggle-one-hit">
        <span class="slider-toggle"></span>
      </label>
    </div>

    <div id="result"></div>
  </aside>

  <!-- ZONE DE JEU -->
  <main id="zone">
    <div id="timer-wrap"><div id="timer-bar"></div></div>
    <div id="idle-msg">Appuie sur START pour jouer</div>

    <!-- CIBLE -->
    <div id="cible">
      <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
        <!-- Fond -->
        <circle cx="25" cy="25" r="24" fill="#ff4d00" stroke="#ff7733" stroke-width="1"/>
        <!-- Croix blanche -->
        <line x1="25" y1="8" x2="25" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="8" y1="25" x2="42" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Cercle intérieur -->
        <circle cx="25" cy="25" r="6" fill="none" stroke="white" stroke-width="2"/>
        <!-- Cercle central -->
        <circle cx="25" cy="25" r="2" fill="white"/>
      </svg>
    </div>
  </main>

  <!-- RIGHT SIDEBAR — LEADERBOARD -->
  <aside id="sidebar-right">
    <div class="lb-tabs">
      <button class="lb-tab active" data-tab="normal">Normal</button>
      <button class="lb-tab" data-tab="hardcore">☠ Hardcore</button>
    </div>
    <div id="lb-panel-normal" class="lb-panel active">
      <ul class="lb-list" id="lb-list-normal"></ul>
      <div class="lb-empty" id="lb-empty-normal">Aucun score</div>
    </div>
    <div id="lb-panel-hardcore" class="lb-panel">
      <ul class="lb-list" id="lb-list-hardcore"></ul>
      <div class="lb-empty" id="lb-empty-hardcore">Aucun score</div>
    </div>
    <div class="lb-footer">
      <button class="btn btn-danger" id="btn-clear-lb">🗑 Réinitialiser</button>
    </div>
  </aside>

</div><!-- /app -->

<!-- MODAL PARAMS / CROSSHAIR -->
<div id="modal-backdrop">
  <div id="modal">
    <div class="modal-header">
      <h2>⚙ Paramètres Crosshair</h2>
      <button class="btn-close" id="btn-close-params">✕</button>
    </div>

    <!-- Presets -->
    <div>
      <div class="section-title" style="margin-bottom:8px">Presets</div>
      <div id="preset-grid"></div>
    </div>

    <div class="modal-row">
      <!-- Preview -->
      <div class="ch-preview-box">
        <svg id="ch-preview-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <!-- Shapes + Colors -->
      <div class="modal-col">
        <div>
          <div class="section-title" style="margin-bottom:8px">Formes</div>
          <div class="shape-btns">
            <button class="shape-btn" data-shape="cross">Cross</button>
            <button class="shape-btn" data-shape="dot">Dot</button>
            <button class="shape-btn" data-shape="circle">Circle</button>
            <button class="shape-btn" data-shape="square">Square</button>
            <button class="shape-btn" data-shape="diamond">Diamond</button>
            <button class="shape-btn" data-shape="tee">T-Sight</button>
          </div>
        </div>
        <div class="controls-grid">
          <div class="ctrl-row">
            <label>Couleur</label>
            <input type="color" id="ch-color" value="#00e676">
          </div>
          <div class="ctrl-row">
            <label>Couleur contour</label>
            <input type="color" id="ch-outline-color" value="#000000">
          </div>
          <div class="ctrl-row">
            <label>Épaisseur contour <span id="v-outline">1</span></label>
            <input type="range" id="ch-outline" min="0" max="3" step="0.5" value="1">
          </div>
          <div class="ctrl-row">
            <label>Opacité <span id="v-opacity">100%</span></label>
            <input type="range" id="ch-opacity" min="0" max="100" value="100">
          </div>
        </div>
      </div>
    </div>

    <!-- Sliders -->
    <div class="controls-grid">
      <div class="ctrl-row">
        <label>Taille <span id="v-size">20</span></label>
        <input type="range" id="ch-size" min="4" max="50" value="20">
      </div>
      <div class="ctrl-row">
        <label>Épaisseur <span id="v-thick">2</span></label>
        <input type="range" id="ch-thick" min="1" max="8" value="2">
      </div>
      <div class="ctrl-row">
        <label>Gap <span id="v-gap">3</span></label>
        <input type="range" id="ch-gap" min="0" max="20" value="3">
      </div>
      <div class="ctrl-row">
        <label>Longueur <span id="v-len">8</span></label>
        <input type="range" id="ch-len" min="2" max="30" value="8">
      </div>
      <div class="ctrl-row">
        <label>Rayon cercle <span id="v-radius">10</span></label>
        <input type="range" id="ch-radius" min="3" max="30" value="10">
      </div>
      <div class="ctrl-row">
        <label>Rotation <span id="v-rotate">0°</span></label>
        <input type="range" id="ch-rotate" min="0" max="180" value="0">
      </div>
    </div>

    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" id="btn-reset-ch" style="flex:1">↺ Réinitialiser</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   CONSTANTES
═══════════════════════════════════════════ */
const DUREE_MAX    = 10;
const INTERVALLE   = 1000;
const TAILLE_CIBLE = 50;
const LS_KEY_LB_NORMAL   = 'timeout_lb_normal';
const LS_KEY_LB_HARDCORE = 'timeout_lb_hardcore';
const LS_KEY_CH          = 'timeout_crosshair';

/* ─── DOM JEU ─────────────────────────────── */
const zone        = document.getElementById('zone');
const cible       = document.getElementById('cible');
const btnStart    = document.getElementById('btn-start');
const resultEl    = document.getElementById('result');
const timerBar    = document.getElementById('timer-bar');
const idleMsg     = document.getElementById('idle-msg');
const scoreVal    = document.getElementById('score-val');
const missVal     = document.getElementById('miss-val');
const pseudoWrap  = document.getElementById('pseudo-wrap');
const pseudoInput = document.getElementById('pseudo-input');
const btnSave     = document.getElementById('btn-save');

/* ─── DOM MODAL ───────────────────────────── */
const btnOpenParams  = document.getElementById('btn-open-params');
const btnCloseParams = document.getElementById('btn-close-params');
const modalBackdrop  = document.getElementById('modal-backdrop');

function openModal()  { modalBackdrop.classList.add('open');    document.body.style.overflow = 'hidden'; }
function closeModal() { modalBackdrop.classList.remove('open'); document.body.style.overflow = ''; }

btnOpenParams.addEventListener('click', openModal);
btnCloseParams.addEventListener('click', closeModal);
modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

/* ─── DOM LEADERBOARD ─────────────────────── */
const lbTabs          = document.querySelectorAll('.lb-tab');
const lbPanels        = document.querySelectorAll('.lb-panel');
const lbListNormal    = document.getElementById('lb-list-normal');
const lbListHardcore  = document.getElementById('lb-list-hardcore');
const lbEmptyNormal   = document.getElementById('lb-empty-normal');
const lbEmptyHardcore = document.getElementById('lb-empty-hardcore');
const btnClearLb      = document.getElementById('btn-clear-lb');

let activeTab = 'normal';

lbTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    activeTab = tab.dataset.tab;
    lbTabs.forEach(t  => t.classList.toggle('active',  t === tab));
    lbPanels.forEach(p => p.classList.toggle('active', p.id === `lb-panel-${activeTab}`));
  });
});

/* ─── DOM PARAMS ──────────────────────────── */
const toggleOneHit = document.getElementById('toggle-one-hit');

/* ─── DOM CROSSHAIR ───────────────────────── */
const chOverlay    = document.getElementById('crosshair-overlay');
const chPreviewSvg = document.getElementById('ch-preview-svg');
const btnResetCh   = document.getElementById('btn-reset-ch');
const presetGrid   = document.getElementById('preset-grid');

const inp = {
  color:        document.getElementById('ch-color'),
  outlineColor: document.getElementById('ch-outline-color'),
  outline:      document.getElementById('ch-outline'),
  opacity:      document.getElementById('ch-opacity'),
  size:         document.getElementById('ch-size'),
  thick:        document.getElementById('ch-thick'),
  gap:          document.getElementById('ch-gap'),
  len:          document.getElementById('ch-len'),
  radius:       document.getElementById('ch-radius'),
  rotate:       document.getElementById('ch-rotate'),
};
const valEls = {
  outline: document.getElementById('v-outline'),
  opacity: document.getElementById('v-opacity'),
  size:    document.getElementById('v-size'),
  thick:   document.getElementById('v-thick'),
  gap:     document.getElementById('v-gap'),
  len:     document.getElementById('v-len'),
  radius:  document.getElementById('v-radius'),
  rotate:  document.getElementById('v-rotate'),
};

/* ═══════════════════════════════════════════
   CROSSHAIR
═══════════════════════════════════════════ */
const DEFAULT_CH = {
  shapes: ['cross','dot'], color:'#00e676', outlineColor:'#000000',
  outline:1, opacity:100, size:20, thick:2, gap:3, len:8, radius:10, rotate:0,
};

const PRESETS = [
  { name:'Classic',  cfg:{ shapes:['cross','dot'],   color:'#00e676', outlineColor:'#000', outline:1,   opacity:100, size:20, thick:2, gap:3,  len:8,  radius:10, rotate:0  }},
  { name:'Sniper',   cfg:{ shapes:['cross'],          color:'#ffffff', outlineColor:'#000', outline:1,   opacity:80,  size:24, thick:1, gap:6,  len:12, radius:10, rotate:0  }},
  { name:'Dot',      cfg:{ shapes:['dot'],            color:'#ff2244', outlineColor:'#000', outline:1.5, opacity:100, size:6,  thick:2, gap:0,  len:6,  radius:6,  rotate:0  }},
  { name:'Circle',   cfg:{ shapes:['circle','dot'],   color:'#ffd600', outlineColor:'#000', outline:1,   opacity:90,  size:16, thick:2, gap:4,  len:6,  radius:12, rotate:0  }},
  { name:'X',        cfg:{ shapes:['cross'],          color:'#ff6b00', outlineColor:'#000', outline:1,   opacity:100, size:18, thick:3, gap:2,  len:8,  radius:10, rotate:45 }},
  { name:'Diamond',  cfg:{ shapes:['diamond'],        color:'#00cfff', outlineColor:'#000', outline:1,   opacity:100, size:20, thick:2, gap:3,  len:8,  radius:10, rotate:0  }},
  { name:'T-Sight',  cfg:{ shapes:['tee'],            color:'#ffffff', outlineColor:'#222', outline:1,   opacity:100, size:20, thick:2, gap:4,  len:10, radius:10, rotate:0  }},
  { name:'Minimal',  cfg:{ shapes:['cross'],          color:'#ffffff', outlineColor:'#000', outline:0,   opacity:60,  size:14, thick:1, gap:4,  len:5,  radius:10, rotate:0  }},
];

let chConfig = { ...DEFAULT_CH, shapes: [...DEFAULT_CH.shapes] };

/* Build preset buttons */
PRESETS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.textContent = p.name;
  btn.addEventListener('click', () => applyPreset(p.cfg));
  presetGrid.appendChild(btn);
});

function applyPreset(cfg) {
  chConfig = { ...cfg, shapes: [...cfg.shapes] };
  syncUIFromConfig();
  saveCHConfig();
  buildCrosshair(chOverlay);
  buildCrosshair(chPreviewSvg);
}

/* Shape buttons */
document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const s = btn.dataset.shape;
    const idx = chConfig.shapes.indexOf(s);
    if (idx === -1) { chConfig.shapes.push(s); btn.classList.add('active'); }
    else            { chConfig.shapes.splice(idx, 1); btn.classList.remove('active'); }
    saveCHConfig();
    buildCrosshair(chOverlay);
    buildCrosshair(chPreviewSvg);
  });
});

/* Sliders */
const sliderMap = [
  ['opacity','opacity', v => v+'%'],
  ['size',   'size',    v => v],
  ['thick',  'thick',   v => v],
  ['gap',    'gap',     v => v],
  ['len',    'len',     v => v],
  ['radius', 'radius',  v => v],
  ['rotate', 'rotate',  v => v+'°'],
  ['outline','outline', v => v],
];
sliderMap.forEach(([inpKey, cfgKey, fmt]) => {
  inp[inpKey].addEventListener('input', () => {
    const v = parseFloat(inp[inpKey].value);
    chConfig[cfgKey] = v;
    if (valEls[inpKey]) valEls[inpKey].textContent = fmt(v);
    saveCHConfig();
    buildCrosshair(chOverlay);
    buildCrosshair(chPreviewSvg);
  });
});
['color','outlineColor'].forEach(key => {
  const el = key === 'color' ? inp.color : inp.outlineColor;
  el.addEventListener('input', (e) => {
    chConfig[key] = e.target.value;
    saveCHConfig();
    buildCrosshair(chOverlay);
    buildCrosshair(chPreviewSvg);
  });
});

/* Reset */
btnResetCh.addEventListener('click', () => {
  chConfig = { ...DEFAULT_CH, shapes: [...DEFAULT_CH.shapes] };
  syncUIFromConfig();
  saveCHConfig();
  buildCrosshair(chOverlay);
  buildCrosshair(chPreviewSvg);
});

function syncUIFromConfig() {
  inp.color.value        = chConfig.color;
  inp.outlineColor.value = chConfig.outlineColor;
  inp.outline.value      = chConfig.outline;
  inp.opacity.value      = chConfig.opacity;
  inp.size.value         = chConfig.size;
  inp.thick.value        = chConfig.thick;
  inp.gap.value          = chConfig.gap;
  inp.len.value          = chConfig.len;
  inp.radius.value       = chConfig.radius;
  inp.rotate.value       = chConfig.rotate;

  if (valEls.outline) valEls.outline.textContent = chConfig.outline;
  valEls.opacity.textContent = chConfig.opacity + '%';
  valEls.size.textContent    = chConfig.size;
  valEls.thick.textContent   = chConfig.thick;
  valEls.gap.textContent     = chConfig.gap;
  valEls.len.textContent     = chConfig.len;
  valEls.radius.textContent  = chConfig.radius;
  valEls.rotate.textContent  = chConfig.rotate + '°';

  document.querySelectorAll('.shape-btn').forEach(btn => {
    btn.classList.toggle('active', chConfig.shapes.includes(btn.dataset.shape));
  });
}

function buildCrosshair(targetSvg) {
  const c   = chConfig;
  const op  = c.opacity / 100;
  const ns  = 'http://www.w3.org/2000/svg';
  const isPreview = targetSvg === chPreviewSvg;
  const dim = isPreview ? 80 : 1;

  targetSvg.setAttribute('width',   dim);
  targetSvg.setAttribute('height',  dim);
  targetSvg.setAttribute('viewBox', `${-dim/2} ${-dim/2} ${dim} ${dim}`);
  targetSvg.setAttribute('overflow','visible');

  while (targetSvg.firstChild) targetSvg.removeChild(targetSvg.firstChild);

  const g = document.createElementNS(ns, 'g');
  g.setAttribute('opacity', op);
  g.setAttribute('transform', `rotate(${c.rotate})`);
  targetSvg.appendChild(g);

  function addShape(tagName, attrs, isFilled = false) {
    if (c.outline > 0) {
      const oc = document.createElementNS(ns, tagName);
      Object.entries(attrs).forEach(([k,v]) => oc.setAttribute(k,v));
      oc.setAttribute('fill',         isFilled ? c.outlineColor : 'none');
      oc.setAttribute('stroke',       c.outlineColor);
      oc.setAttribute('stroke-width', isFilled ? 0 : c.thick + c.outline * 2);
      oc.setAttribute('stroke-linecap','round');
      g.appendChild(oc);
    }
    const el = document.createElementNS(ns, tagName);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
    el.setAttribute('fill',          isFilled ? c.color : 'none');
    el.setAttribute('stroke',        isFilled ? 'none'  : c.color);
    el.setAttribute('stroke-width',  c.thick);
    el.setAttribute('stroke-linecap','round');
    g.appendChild(el);
    return el;
  }

  const { gap, len, radius: rad, size: sz } = c;

  c.shapes.forEach(shape => {
    switch(shape) {
      case 'cross':
        addShape('line', { x1:0, y1:-gap,       x2:0,       y2:-(gap+len) });
        addShape('line', { x1:0, y1:gap,        x2:0,       y2:  gap+len  });
        addShape('line', { x1:-gap,   y1:0, x2:-(gap+len),  y2:0 });
        addShape('line', { x1:gap,    y1:0, x2:  gap+len,   y2:0 });
        break;
      case 'dot':
        addShape('circle', { cx:0, cy:0, r: c.thick + 1 }, true);
        break;
      case 'circle':
        addShape('circle', { cx:0, cy:0, r: rad });
        break;
      case 'square': {
        const h = sz/2;
        addShape('rect', { x:-h, y:-h, width:sz, height:sz });
        break;
      }
      case 'diamond': {
        const h = sz/2;
        addShape('polygon', { points:`0,${-h} ${h},0 0,${h} ${-h},0` });
        break;
      }
      case 'tee':
        addShape('line', { x1:-(gap+len), y1:0, x2:gap+len, y2:0 });
        addShape('line', { x1:0, y1:gap, x2:0, y2:gap+len });
        break;
    }
  });
}

/* Mouse tracking */
zone.addEventListener('mousemove', (e) => {
  chOverlay.style.left = e.clientX + 'px';
  chOverlay.style.top  = e.clientY + 'px';
});
zone.addEventListener('mouseenter', () => { chOverlay.style.display = 'block'; });
zone.addEventListener('mouseleave', () => { chOverlay.style.display = 'none';  });

/* Persist */
function saveCHConfig() { localStorage.setItem(LS_KEY_CH, JSON.stringify(chConfig)); }
function loadCHConfig() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY_CH));
    if (s) chConfig = { ...DEFAULT_CH, ...s, shapes: s.shapes || [...DEFAULT_CH.shapes] };
  } catch {}
}

/* ═══════════════════════════════════════════
   LEADERBOARD
═══════════════════════════════════════════ */
function lbKey(hc)  { return hc ? LS_KEY_LB_HARDCORE : LS_KEY_LB_NORMAL; }
function lbLoad(hc) { try { return JSON.parse(localStorage.getItem(lbKey(hc))) || []; } catch { return []; } }
function lbSave(d,hc) { localStorage.setItem(lbKey(hc), JSON.stringify(d)); }

function lbAdd(pseudo, sc, ms, hc) {
  const data = lbLoad(hc);
  data.push({ pseudo: pseudo.trim() || 'Anonyme', score: sc, misses: ms, date: Date.now() });
  data.sort((a,b) => b.score - a.score || a.misses - b.misses || a.date - b.date);
  lbSave(data.slice(0,10), hc);
  renderLB(false); renderLB(true);
}

function lbClear() {
  lbSave([], activeTab === 'hardcore');
  renderLB(activeTab === 'hardcore');
}

function renderLB(hc) {
  const data   = lbLoad(hc);
  const list   = hc ? lbListHardcore  : lbListNormal;
  const empty  = hc ? lbEmptyHardcore : lbEmptyNormal;
  const medals = ['gold','silver','bronze'];
  const tiers  = ['top1','top2','top3'];

  list.innerHTML = '';
  if (!data.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  data.forEach((e,i) => {
    const li = document.createElement('li');
    if (tiers[i]) li.classList.add(tiers[i]);
    li.innerHTML = `
      <span class="lb-rank ${medals[i]||''}">${i+1}</span>
      <span class="lb-pseudo">${e.pseudo}</span>
      <span class="lb-score">${e.score}</span>
      <span class="lb-miss">${e.misses}✗</span>`;
    list.appendChild(li);
  });
}

/* ═══════════════════════════════════════════
   JEU
═══════════════════════════════════════════ */
let intervalDeplacement = null, timeoutFin = null, intervalBarre = null;
let debut = null, score = 0, misses = 0, enCours = false;

function isOneHit() { return toggleOneHit.checked; }

toggleOneHit.addEventListener('change', () => {
  zone.classList.toggle('one-hit-mode', isOneHit());
  if (!enCours) idleMsg.textContent = isOneHit() ? '☠ ONE HIT – Un miss = PERDU' : 'Appuie sur START pour jouer';
});

function positionAleatoire() {
  return {
    x: Math.floor(Math.random() * (zone.clientWidth  - TAILLE_CIBLE)),
    y: Math.floor(Math.random() * (zone.clientHeight - TAILLE_CIBLE)),
  };
}

function deplacerCible() {
  const { x, y } = positionAleatoire();
  cible.style.left = x + 'px';
  cible.style.top  = y + 'px';
  cible.classList.remove('teleport');
  void cible.offsetWidth;
  cible.classList.add('teleport');
}

function afficherPopup(x, y, type) {
  const el = document.createElement('div');
  el.className = 'popup ' + type;
  el.textContent = type === 'hit' ? '+1' : 'MISS';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  zone.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function stopperTimers() {
  clearInterval(intervalDeplacement);
  clearTimeout(timeoutFin);
  clearInterval(intervalBarre);
  intervalDeplacement = intervalBarre = timeoutFin = null;
}

function mettreAJourBarre() {
  const ratio = Math.max(0, 1 - (Date.now() - debut) / (DUREE_MAX * 1000));
  timerBar.style.width      = (ratio * 100) + '%';
  timerBar.style.background = ratio > 0.5 ? 'var(--accent)' : ratio > 0.25 ? 'var(--accent2)' : 'var(--red)';
}

function finDePartie(raison) {
  if (!enCours) return;
  enCours = false;
  stopperTimers();
  cible.style.display   = 'none';
  idleMsg.style.opacity = '1';
  timerBar.style.width  = '0%';
  timerBar.style.background = 'var(--red)';

  if (raison === 'miss') {
    resultEl.textContent = `☠ ONE HIT — PERDU !  Score : ${score}`;
    resultEl.className   = 'lose';
    idleMsg.textContent  = '☠ ONE HIT – Un miss = PERDU';
  } else {
    resultEl.textContent = `⏱ Temps écoulé !  Score : ${score}  •  ${misses} miss`;
    resultEl.className   = score > 0 ? 'win' : '';
    idleMsg.textContent  = isOneHit() ? '☠ ONE HIT – Un miss = PERDU' : 'Appuie sur START pour jouer';
  }
  pseudoWrap.style.display = 'flex';
  pseudoInput.focus();
}

zone.addEventListener('click', (e) => {
  if (!enCours || e.target === cible) return;
  misses++;
  missVal.textContent = misses;
  const r = zone.getBoundingClientRect();
  afficherPopup(e.clientX - r.left - 20, e.clientY - r.top - 20, 'miss');
  zone.classList.remove('flash-miss');
  void zone.offsetWidth;
  zone.classList.add('flash-miss');
  if (isOneHit()) finDePartie('miss');
});

cible.addEventListener('click', (e) => {
  if (!enCours) return;
  e.stopPropagation();
  score++;
  scoreVal.textContent = score;
  const r = zone.getBoundingClientRect();
  afficherPopup(e.clientX - r.left - 10, e.clientY - r.top - 20, 'hit');
  clearInterval(intervalDeplacement);
  deplacerCible();
  intervalDeplacement = setInterval(deplacerCible, INTERVALLE);
});

function enregistrerScore() {
  lbAdd(pseudoInput.value, score, misses, isOneHit());
  pseudoWrap.style.display = 'none';
  pseudoInput.value = '';
  btnStart.disabled = false;

  const targetTab = isOneHit() ? 'hardcore' : 'normal';
  lbTabs.forEach(t  => t.classList.toggle('active',  t.dataset.tab === targetTab));
  lbPanels.forEach(p => p.classList.toggle('active', p.id === `lb-panel-${targetTab}`));
  activeTab = targetTab;
}

btnSave.addEventListener('click', enregistrerScore);
pseudoInput.addEventListener('keydown', e => { if (e.key === 'Enter') enregistrerScore(); });

function demarrer() {
  score = misses = 0;
  scoreVal.textContent = missVal.textContent = '0';
  resultEl.textContent = '';
  resultEl.className   = '';
  timerBar.style.width = '100%';
  timerBar.style.background = 'var(--accent)';
  idleMsg.style.opacity    = '0';
  pseudoWrap.style.display = 'none';
  btnStart.disabled = true;
  enCours           = true;

  cible.style.display = 'block';
  deplacerCible();
  debut = Date.now();

  intervalDeplacement = setInterval(deplacerCible, INTERVALLE);
  timeoutFin          = setTimeout(() => finDePartie('temps'), DUREE_MAX * 1000);
  intervalBarre       = setInterval(mettreAJourBarre, 16);
}

btnStart.addEventListener('click', demarrer);
btnClearLb.addEventListener('click', () => {
  const label = activeTab === 'hardcore' ? 'Hardcore' : 'Normal';
  if (confirm(`Réinitialiser le classement ${label} ?`)) lbClear();
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
loadCHConfig();
syncUIFromConfig();
buildCrosshair(chOverlay);
buildCrosshair(chPreviewSvg);
renderLB(false);
renderLB(true);
</script>
</body>
</html>
